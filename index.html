<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SleekSuite - Free Markdown Invoice Generator</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        @media print {
            .no-print { display: none !important; }
            .print-area { width: 100% !important; max-width: 100% !important; box-shadow: none !important; margin: 0 !important; padding: 0 !important; }
        }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen flex flex-col font-sans">

    <!-- HEADER -->
    <header class="no-print border-b border-zinc-800 bg-zinc-900/50 backdrop-blur px-6 py-4 flex flex-wrap justify-between items-center gap-4">
        <div>
            <h1 id="main-title" class="text-lg font-bold tracking-tight text-white">SleekSuite Invoice Generator</h1>
            <p class="text-xs text-zinc-400">100% Client-Side. Zero Data Collection.</p>
        </div>
        <div class="flex items-center gap-3">
            <a href="resources.html" class="text-xs text-zinc-400 hover:text-white px-2 py-2 transition">Dashboard</a>
            <a href="contract.html" class="text-xs text-zinc-400 hover:text-white px-2 py-2 transition">Contracts</a>
            <a href="receipt.html" class="text-xs text-zinc-400 hover:text-white px-2 py-2 transition">Receipts</a>
            <a href="#" class="text-xs bg-zinc-800 hover:bg-zinc-700 text-zinc-300 font-medium px-3 py-2 rounded-lg transition">Vault ($5)</a>
            <a href="#" class="text-xs bg-indigo-600 hover:bg-indigo-500 text-white font-medium px-3 py-2 rounded-lg transition shadow-md">All-Access ($29)</a>
            <button onclick="window.print()" class="text-xs bg-emerald-600 hover:bg-emerald-500 text-white font-medium px-4 py-2 rounded-lg transition shadow-md cursor-pointer">Print / Save PDF</button>
        </div>
    </header>

    <!-- CONTAINER -->
    <main class="flex-1 flex flex-col md:flex-row h-full">
        <section class="no-print flex-1 border-r border-zinc-800 p-4 bg-zinc-900/20">
            <textarea id="markdown-input" class="w-full h-[calc(100vh-140px)] bg-transparent text-zinc-300 font-mono text-sm p-2 focus:outline-none resize-none leading-relaxed" placeholder="Type invoice markdown..."></textarea>
        </section>
        <section class="flex-1 p-6 bg-zinc-900/40 flex justify-center overflow-y-auto">
            <div id="preview-output" class="print-area w-full max-w-2xl bg-white text-zinc-900 p-8 rounded-xl shadow-2xl min-h-[842px] prose prose-zinc max-w-none"></div>
        </section>
    </main>

    <script>
        const invoiceNicheMatrix = {
            "web-developer": {
                title: "Freelance Web Developer Invoice Template",
                text: "### INVOICE\n\n**Developer:** [Your Name / Agency]\n**Client:** [Client Company]\n\n### Billable Services\n| Description | Hours | Rate | Total |\n| :--- | :---: | :---: | :---: |\n| Front-End React Component Development | 40 | $75.00 | $3,000.00 |\n| Next.js API Routings & Webhook Setups | 10 | $75.00 | $750.00 |\n\n**Total Balance Due: $3,750.00**"
            },
            "graphic-designer": {
                title: "Freelance Graphic Designer Invoice Template",
                text: "### INVOICE\n\n**Designer:** [Your Creative Studio]\n**Client:** [Brand Partner Name]\n\n### Creative Asset Deliverables\n* **Brand Strategy & Logo Selection Guide**\n  Complete guidelines, layout grids, and color tokens. — *$1,500.00*\n* **High-Res Vector Export Deliverables** — *$500.00*\n\n**Total Balance Due: $2,000.00**"
            },
            "copywriter": {
                title: "SaaS Content Copywriter Invoice Template",
                text: "### INVOICE\n\n**Writer:** [Your Studio Name]\n**Client:** [SaaS Software Corp]\n\n### Editorial Deliverables\n* **High-Conversion V2 Landing Page Script Execution** — $1,200.00\n* **3x Deep-Dive Niche Competitor Blog Articles** — $900.00\n\n**Total Balance Due: $2,100.00**"
            }
        };

        const defaultText = "### Professional Invoice Layout\n\n**From:** [Your Business Name]\n**To:** [Client Name]\n\n---\n\n### Services Rendered\n\n* **Consulting & Implementation Services**\n  Flat-rate optimization package milestone execution.\n  *Amount: $1,500.00*\n\n**Total Outstanding: $1,500.00**";

        const textarea = document.getElementById('markdown-input');
        const output = document.getElementById('preview-output');
        const mainTitle = document.getElementById('main-title');

        function render() { output.innerHTML = marked.parse(textarea.value); }

        function init() {
            const urlParams = new URLSearchParams(window.location.search);
            const niche = urlParams.get('niche');
            if (niche && invoiceNicheMatrix[niche]) {
                document.title = invoiceNicheMatrix[niche].title + " | SleekSuite";
                if (mainTitle) mainTitle.innerText = invoiceNicheMatrix[niche].title;
                textarea.value = invoiceNicheMatrix[niche].text;
            } else {
                textarea.value = defaultText;
            }
            render();
        }
        textarea.addEventListener('input', render);
        window.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
