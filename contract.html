<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SleekSuite - Free Markdown Legal Contract Builder</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        @media print {
            .no-print { display: none !important; }
            .print-area { width: 100% !important; max-width: 100% !important; box-shadow: none !important; margin: 0 !important; padding: 0 !important; }
        }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen flex flex-col font-sans">

    <!-- HEADER -->
    <header class="no-print border-b border-zinc-800 bg-zinc-900/50 backdrop-blur px-6 py-4 flex flex-wrap justify-between items-center gap-4">
        <div>
            <h1 id="main-title" class="text-lg font-bold tracking-tight text-white">SleekSuite Contract Builder</h1>
            <p class="text-xs text-zinc-400">100% Client-Side. Clean Legal Format.</p>
        </div>
        <div class="flex items-center gap-3">
            <a href="index.html" class="text-xs text-zinc-400 hover:text-white px-2 py-2 transition">Invoices</a>
            <a href="receipt.html" class="text-xs text-zinc-400 hover:text-white px-2 py-2 transition">Receipts</a>
            <a href="#" class="text-xs bg-zinc-800 hover:bg-zinc-700 text-zinc-300 font-medium px-3 py-2 rounded-lg transition">Vault ($5)</a>
            <a href="#" class="text-xs bg-indigo-600 hover:bg-indigo-500 text-white font-medium px-3 py-2 rounded-lg transition shadow-md">All-Access ($29)</a>
            <button onclick="window.print()" class="text-xs bg-emerald-600 hover:bg-emerald-500 text-white font-medium px-4 py-2 rounded-lg transition shadow-md cursor-pointer">Print Agreement</button>
        </div>
    </header>

    <!-- WORKspace -->
    <main class="flex-1 flex flex-col md:flex-row h-full">
        <section class="no-print flex-1 border-r border-zinc-800 p-4 bg-zinc-900/20">
            <textarea id="markdown-input" class="w-full h-[calc(100vh-140px)] bg-transparent text-zinc-300 font-mono text-sm p-2 focus:outline-none resize-none leading-relaxed" placeholder="Type contract text..."></textarea>
        </section>
        <section class="flex-1 p-6 bg-zinc-900/40 flex justify-center overflow-y-auto">
            <div id="preview-output" class="print-area w-full max-w-2xl bg-white text-zinc-900 p-8 rounded-xl shadow-2xl min-h-[842px] prose prose-zinc max-w-none"></div>
        </section>
    </main>

    <script>
        const contractNicheMatrix = {
            "web-developer": {
                title: "Freelance Web Developer Consulting Agreement",
                text: "### INDEPENDENT CONTRACTOR AGREEMENT\n\n**1. Scope of Work:** The Developer agrees to configure frontend components, maintain repo access, and deploy products to production environments via Vercel engines.\n\n**2. Compensation:** Payment will be executed via fixed milestone tranches upon verification of build distributions.\n\n**3. Code Ownership:** Full IP rights transfer to Client immediately upon final payout confirmation."
            },
            "graphic-designer": {
                title: "Graphic Design Creative Services Contract",
                text: "### CREATIVE SERVICES AGREEMENT\n\n**1. Scope of Work:** The Artist agrees to curate style guides, vector components, and interface layers for the Client.\n\n**2. Review Cycles:** The agreed fee structures support up to three (3) baseline architectural revisions before alternate rates engage.\n\n**3. Usage Rights:** Complete universal commercial usage permits transfer upon final payment."
            },
            "copywriter": {
                title: "SaaS Content Copywriter Agreement Layout",
                text: "### CONTENT PRODUCTION CONTRACT\n\n**1. Scope of Work:** The Provider executes target landing scripts, optimization outlines, and operational documentation.\n\n**2. Deadlines:** Deliverables must deploy into collaborative review interfaces within 7 working days of initiation."
            }
        };

        const defaultContractText = "### Independent Contractor Agreement\n\n**This Agreement is entered into by and between:**\n\n**Contractor:** [Your Contractor/Company Name]\n**Client:** [Client Name]\n\n---\n\n**1. Services Rendered:** Contractor agrees to perform specialized professional services as itemized inside active project scopes.\n\n**2. Terms:** Payments are expected within Net 14 timelines from submission vectors.";

        const textarea = document.getElementById('markdown-input');
        const output = document.getElementById('preview-output');
        const mainTitle = document.getElementById('main-title');

        function render() { output.innerHTML = marked.parse(textarea.value); }

        function init() {
            const urlParams = new URLSearchParams(window.location.search);
            const niche = urlParams.get('niche');
            if (niche && contractNicheMatrix[niche]) {
                document.title = contractNicheMatrix[niche].title + " | SleekSuite";
                if (mainTitle) mainTitle.innerText = contractNicheMatrix[niche].title;
                textarea.value = contractNicheMatrix[niche].text;
            } else {
                textarea.value = defaultContractText;
            }
            render();
        }
        textarea.addEventListener('input', render);
        window.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
