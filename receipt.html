<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SleekSuite - Free Minimal Payment Receipt Generator</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        @media print {
            .no-print { display: none !important; }
            .print-area { width: 100% !important; max-width: 100% !important; box-shadow: none !important; margin: 0 !important; padding: 0 !important; }
        }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen flex flex-col font-sans">

    <!-- HEADER -->
    <header class="no-print border-b border-zinc-800 bg-zinc-900/50 backdrop-blur px-6 py-4 flex flex-wrap justify-between items-center gap-4">
        <div>
            <h1 id="main-title" class="text-lg font-bold tracking-tight text-white">SleekSuite Receipt Generator</h1>
            <p class="text-xs text-zinc-400">Instant Clean Receipts. Client-Side.</p>
        </div>
        <div class="flex items-center gap-3">
            <a href="index.html" class="text-xs text-zinc-400 hover:text-white px-2 py-2 transition">Invoices</a>
            <a href="contract.html" class="text-xs text-zinc-400 hover:text-white px-2 py-2 transition">Contracts</a>
            <a href="#" class="text-xs bg-zinc-800 hover:bg-zinc-700 text-zinc-300 font-medium px-3 py-2 rounded-lg transition">Vault ($5)</a>
            <a href="#" class="text-xs bg-indigo-600 hover:bg-indigo-500 text-white font-medium px-3 py-2 rounded-lg transition shadow-md">All-Access ($29)</a>
            <button onclick="window.print()" class="text-xs bg-emerald-600 hover:bg-emerald-500 text-white font-medium px-4 py-2 rounded-lg transition shadow-md cursor-pointer">Print Receipt</button>
        </div>
    </header>

    <!-- CONTENT -->
    <main class="flex-1 flex flex-col md:flex-row h-full">
        <section class="no-print flex-1 border-r border-zinc-800 p-4 bg-zinc-900/20">
            <textarea id="markdown-input" class="w-full h-[calc(100vh-140px)] bg-transparent text-zinc-300 font-mono text-sm p-2 focus:outline-none resize-none leading-relaxed" placeholder="Type receipt..."></textarea>
        </section>
        <section class="flex-1 p-6 bg-zinc-900/40 flex justify-center overflow-y-auto">
            <div id="preview-output" class="print-area w-full max-w-2xl bg-white text-zinc-900 p-8 rounded-xl shadow-2xl min-h-[400px] prose prose-zinc max-w-none"></div>
        </section>
    </main>

    <script>
        const receiptNicheMatrix = {
            "web-developer": {
                title: "Web Development Services Payment Receipt",
                text: "### PAYMENT RECEIPT\n\n**Status:** PAID IN FULL\n**Merchant:** [Your Dev Business]\n\n**Amount Documented:** $3,750.00\n\n**Allocation Matrix:** Fullstack system construction milestone, component testing, and production deployment pipeline configurations."
            },
            "graphic-designer": {
                title: "Graphic Design Creative Deliverables Receipt",
                text: "### PAYMENT RECEIPT\n\n**Status:** PAID IN FULL\n**Merchant:** [Your Creative Studio]\n\n**Amount Documented:** $2,000.00\n\n**Allocation Matrix:** Comprehensive identity layouts, vector format asset suite delivery, and brand guideline books."
            },
            "copywriter": {
                title: "SaaS Content Copywriter Settlement Receipt",
                text: "### PAYMENT RECEIPT\n\n**Status:** PAID IN FULL\n\n**Amount Documented:** $2,100.00\n\n**Allocation Matrix:** Professional copywriting deployment, target landing arrays, and editorial text compilation."
            }
        };

        const defaultReceiptText = "### Payment Receipt\n\n**Merchant Account:** [Your Name]\n**Received From:** [Client Identity Name]\n\n---\n\n**Status:** TRANSACTION SETTLED / PAID IN FULL\n\n**Total Amount Cleared:** $500.00";

        const textarea = document.getElementById('markdown-input');
        const output = document.getElementById('preview-output');
        const mainTitle = document.getElementById('main-title');

        function render() { output.innerHTML = marked.parse(textarea.value); }

        function init() {
            const urlParams = new URLSearchParams(window.location.search);
            const niche = urlParams.get('niche');
            if (niche && receiptNicheMatrix[niche]) {
                document.title = receiptNicheMatrix[niche].title + " | SleekSuite";
                if (mainTitle) mainTitle.innerText = receiptNicheMatrix[niche].title;
                textarea.value = receiptNicheMatrix[niche].text;
            } else {
                textarea.value = defaultReceiptText;
            }
            render();
        }
        textarea.addEventListener('input', render);
        window.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
